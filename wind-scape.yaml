substitutions:
  device_name: "wind-scape"
  friendly_name: "WindScape"
  
  # PWM Configuration
  pwm_frequency: "25000Hz"
  pwm_min_power: "0"
  
  # Fan operational limits
  fan_speed_min: "0"
  fan_speed_max: "100"
  fan_speed_default: "80"
  
  # Base timing intervals
  sensor_update_interval: "1s"
  
  # External sensor configuration
  external_kmh_sensor_entity: "sensor.my_speed_in_kmh"  # Change this to your HA entity
  external_max_kmh: "160"  # KMH that maps to 100% fan speed
  external_min_kmh: "0"    # KMH that maps to 10% fan speed
  external_sensor_update_interval: "200ms"
  external_sensor_timeout: "60s"  # Timeout before reverting mode

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Transforming ordinary PC fans into natural wind simulation desk fans. https://github.com/TilmanGriesel/WindScape"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: DEBUG
  logs:
    wind: DEBUG

# ====================================================================================
# HARDWARE CONFIGURATION
# ====================================================================================

output:
  - platform: ledc
    pin: GPIO14
    id: fan_pwm_output
    frequency: ${pwm_frequency}
    min_power: ${pwm_min_power}

  # Virtual oscillation output
  - platform: template
    id: oscillation_output
    type: binary
    write_action:
      - lambda: |-
          // This output doesn't control hardware, just tracks state
          // The actual oscillation logic is handled in on_oscillating_set

fan:
  - platform: speed
    name: "Fan Control"
    id: desk_fan
    output: fan_pwm_output
    oscillation_output: oscillation_output
    speed_count: 100
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:fan"
    preset_modes:
      - "Countryside (Low)"     # Steady Low when oscillating=OFF, Countryside when oscillating=ON
      - "Mediterranean (Medium)" # Steady Medium when oscillating=OFF, Mediterranean when oscillating=ON 
      - "Ocean (High)"          # Steady High when oscillating=OFF, Ocean when oscillating=ON
      - "Mountain (Breeze)"     # Steady Breeze when oscillating=OFF, Mountain when oscillating=ON
      - "Plains (Max)"          # Steady Max when oscillating=OFF, Plains when oscillating=ON
      - "External"              # External sensor mode
    on_turn_on:
      - logger.log: "Fan Control turned ON - enabling fan power"
      - lambda: |-
          id(fan_power_enabled) = true;
    on_turn_off:
      - logger.log: "Fan Control turned OFF - disabling fan power"
      - lambda: |-
          id(fan_power_enabled) = false;
          id(fan_pwm_output).turn_off();
          // Stop all simulations when fan is turned off
          id(wind_simulation_loop).stop();
          id(gust_check_loop).stop();
          id(thermal_bubble_loop).stop();
          id(external_sensor_loop).stop();
          id(external_sensor_timeout_loop).stop();
          id(wind_simulation_active) = false;
    on_speed_set:
      - logger.log:
          format: "Manual fan speed set to: %.0f%%"
          args: ['x']
      - script.execute:
          id: apply_fan_speed
          speed_percent: !lambda "return x;"
    on_oscillating_set:
      - logger.log:
          format: "Oscillating mode changed to: %s"
          args: ['x ? "Wind Simulation" : "Steady Mode"']
      - lambda: |-
          // Sync the dedicated Wind Simulation switch state
          id(wind_simulation_switch).publish_state(x);
      - script.execute:
          id: handle_mode_change
          oscillating: !lambda "return x;"
    on_preset_set:
      - logger.log:
          format: "Fan preset changed to: %s"
          args: ['x.c_str()']
      - script.execute:
          id: handle_preset_change
          preset_name: !lambda "return x;"

# ====================================================================================
# SENSORS & MONITORING
# ====================================================================================

sensor:
  # External Home Assistant sensor
  - platform: homeassistant
    name: "External Speed km/h"
    id: external_kmh_input
    entity_id: ${external_kmh_sensor_entity}
    unit_of_measurement: "km/h"
    icon: "mdi:weather-windy"
    accuracy_decimals: 1
    filters:
      - lambda: |-
          if (isnan(x) || x < 0) return 0.0;
          return x;
    on_value:
      - lambda: |-
          // Update last received time
          id(last_external_sensor_update) = millis() / 1000.0f;
      - if:
          condition:
            lambda: 'return id(current_preset_mode) != "External";'
          then:
            - logger.log: "Auto-switching to External preset due to sensor data"
            - lambda: |-
                // Store current preset as previous before switching
                if (id(current_preset_mode) != "External") {
                  id(previous_preset_mode) = id(current_preset_mode);
                }
                id(current_preset_mode) = "External";
            - lambda: |-
                auto call = id(desk_fan).make_call();
                call.set_preset_mode("External");
                call.perform();

  # Fan RPM monitoring
  - platform: pulse_counter
    pin:
      number: GPIO27
      mode:
        input: true
        pullup: true
    name: "Fan RPM"
    id: fan_rpm
    update_interval: 2s
    unit_of_measurement: "RPM"
    icon: "mdi:speedometer"
    accuracy_decimals: 0
    filters:
      - multiply: 0.5

  # Current wind speed
  - platform: template
    name: "Wind Speed"
    id: wind_speed_sensor
    unit_of_measurement: "m/s"
    icon: "mdi:weather-windy"
    accuracy_decimals: 1
    state_class: "measurement"
    update_interval: ${sensor_update_interval}

  # Current gust status
  - platform: template
    name: "Gust Active"
    id: gust_active_sensor
    unit_of_measurement: "%"
    icon: "mdi:weather-windy-variant"
    accuracy_decimals: 0
    state_class: "measurement"
    update_interval: ${sensor_update_interval}

  # Current preset mode
  - platform: template
    name: "Current Preset Mode"
    id: current_preset_sensor
    icon: "mdi:cog"
    state_class: "measurement"
    update_interval: ${sensor_update_interval}
    lambda: |-
      return id(current_preset_mode);

  # Thermal bubble status
  - platform: template
    name: "Thermal Bubble Active"
    id: thermal_bubble_sensor
    unit_of_measurement: "%"
    icon: "mdi:fire"
    accuracy_decimals: 0
    state_class: "measurement"
    update_interval: ${sensor_update_interval}

  # Von Kármán turbulence energy
  - platform: template
    name: "Turbulence Energy"
    id: turbulence_energy_sensor
    unit_of_measurement: "J"
    icon: "mdi:sine-wave"
    accuracy_decimals: 2
    state_class: "measurement"
    update_interval: ${sensor_update_interval}

  # System diagnostics
  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 60s

  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  - platform: internal_temperature
    name: "${friendly_name} CPU Temperature"
    update_interval: 30s

  - platform: template
    name: "${friendly_name} Free Heap"
    unit_of_measurement: "bytes"
    icon: "mdi:memory"
    accuracy_decimals: 0
    state_class: "measurement"
    update_interval: 30s
    lambda: |-
      return ESP.getFreeHeap();

# ====================================================================================
# USER CONTROLS
# ====================================================================================

number:
  # Global wind intensity multiplier
  - platform: template
    name: "Wind Intensity"
    id: wind_intensity
    min_value: 30
    max_value: 150
    step: 5
    initial_value: 100
    unit_of_measurement: "%"
    restore_value: true
    icon: "mdi:weather-windy-variant"
    mode: slider
    optimistic: true

  # How often gusts occur (affects probability)
  - platform: template
    name: "Gust Frequency"
    id: gust_frequency
    min_value: 10
    max_value: 90
    step: 5
    initial_value: 30
    unit_of_measurement: "%"
    restore_value: true
    icon: "mdi:sine-wave"
    mode: slider
    optimistic: true

  # Minimum wind variation to prevent stagnation
  - platform: template
    name: "Wind Variability"
    id: wind_variability
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 40
    unit_of_measurement: "%"
    restore_value: true
    icon: "mdi:wave"
    mode: slider
    optimistic: true

  # Von Kármán turbulence length scale
  - platform: template
    name: "Turbulence Length Scale"
    id: turbulence_length_scale_control
    min_value: 5
    max_value: 100
    step: 5
    initial_value: 25
    unit_of_measurement: "m"
    restore_value: true
    icon: "mdi:ruler"
    mode: slider
    optimistic: true
    on_value:
      - lambda: |-
          id(turbulence_length_scale) = x;

  # Von Kármán turbulence intensity
  - platform: template
    name: "Turbulence Intensity"
    id: turbulence_intensity_control
    min_value: 0.1
    max_value: 1.0
    step: 0.05
    initial_value: 0.3
    unit_of_measurement: "σ"
    restore_value: true
    icon: "mdi:weather-windy-variant"
    mode: slider
    optimistic: true
    on_value:
      - lambda: |-
          id(turbulence_intensity_sigma) = x;

  # Thermal bubble frequency
  - platform: template
    name: "Thermal Bubble Frequency"
    id: thermal_bubble_frequency_control
    min_value: 0.01
    max_value: 0.2
    step: 0.01
    initial_value: 0.05
    unit_of_measurement: "Hz"
    restore_value: true
    icon: "mdi:fire"
    mode: slider
    optimistic: true
    on_value:
      - lambda: |-
          id(thermal_bubble_frequency) = x;

  # Thermal bubble strength
  - platform: template
    name: "Thermal Bubble Strength"
    id: thermal_bubble_strength_control
    min_value: 1.0
    max_value: 5.0
    step: 0.1
    initial_value: 2.5
    unit_of_measurement: "×"
    restore_value: true
    icon: "mdi:thermometer-plus"
    mode: slider
    optimistic: true
    on_value:
      - lambda: |-
          id(thermal_bubble_strength) = x;

  # Thermal bubble radius
  - platform: template
    name: "Thermal Bubble Radius"
    id: thermal_bubble_radius_control
    min_value: 5
    max_value: 50
    step: 5
    initial_value: 15
    unit_of_measurement: "m"
    restore_value: true
    icon: "mdi:circle-outline"
    mode: slider
    optimistic: true
    on_value:
      - lambda: |-
          id(thermal_bubble_radius) = x;

  # Minimum fan speed
  - platform: template
    name: "Minimum Fan Speed"
    id: minimum_fan_speed
    min_value: ${fan_speed_min}
    max_value: 50
    step: 5
    initial_value: 0
    unit_of_measurement: "%"
    restore_value: true
    icon: "mdi:speedometer-slow"
    mode: slider
    optimistic: true

  # Maximum fan speed
  - platform: template
    name: "Maximum Fan Speed"
    id: fan_speed_limit
    min_value: 40
    max_value: ${fan_speed_max}
    step: 5
    initial_value: ${fan_speed_default}
    unit_of_measurement: "%"
    restore_value: true
    icon: "mdi:speedometer"
    mode: slider
    optimistic: true

# Wind simulation control
switch:
  - platform: template
    name: "Wind Simulation"
    id: wind_simulation_switch
    icon: "mdi:weather-windy"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: |-
      return id(is_oscillating);
    turn_on_action:
      - logger.log: "Wind Simulation enabled via dedicated switch"
      - lambda: |-
          auto call = id(desk_fan).make_call();
          call.set_oscillating(true);
          call.perform();
    turn_off_action:
      - logger.log: "Wind Simulation disabled via dedicated switch"
      - lambda: |-
          auto call = id(desk_fan).make_call();
          call.set_oscillating(false);
          call.perform();

# System status
binary_sensor:
  - platform: status
    name: "${friendly_name} Status"

  - platform: template
    name: "${friendly_name} Wind Simulation Active"
    id: simulation_active_sensor
    icon: "mdi:weather-windy"
    lambda: |-
      return id(wind_simulation_active);

# ====================================================================================
# GLOBAL STATE VARIABLES
# ====================================================================================

globals:
  # Global power control
  - id: fan_power_enabled
    type: bool
    restore_value: true
    initial_value: 'true'

  # External sensor timeout tracking
  - id: last_external_sensor_update
    type: float
    restore_value: false
    initial_value: '0.0'
  
  - id: current_preset_mode
    type: std::string
    restore_value: true
    initial_value: '"Countryside (Low)"'
  
  - id: previous_preset_mode
    type: std::string
    restore_value: true
    initial_value: '"Countryside (Low)"'

  # Track oscillating state
  - id: is_oscillating
    type: bool
    restore_value: true
    initial_value: 'false'

  # Simulation control
  - id: wind_simulation_active
    type: bool
    restore_value: false
    initial_value: 'false'
  
  # Current wind state
  - id: current_wind_speed
    type: float
    restore_value: false
    initial_value: '3.6'
    
  - id: target_wind_speed
    type: float
    restore_value: false
    initial_value: '3.6'
    
  - id: wind_change_rate
    type: float
    restore_value: false
    initial_value: '0.1'
    
  # Gust state
  - id: gust_active
    type: bool
    restore_value: false
    initial_value: 'false'
    
  - id: gust_start_time
    type: float
    restore_value: false
    initial_value: '0.0'
    
  - id: gust_duration
    type: float
    restore_value: false
    initial_value: '3.0'
    
  - id: gust_intensity
    type: float
    restore_value: false
    initial_value: '1.0'
    
  - id: last_gust_check
    type: float
    restore_value: false
    initial_value: '0.0'
    
  # Wind behavior parameters (set by location and phase)
  - id: base_wind_min
    type: float
    restore_value: false
    initial_value: '2.2'

  - id: base_wind_max
    type: float
    restore_value: false
    initial_value: '6.7'

  - id: gust_probability_base
    type: float
    restore_value: false
    initial_value: '0.02'
    
  - id: location_gust_strength
    type: float
    restore_value: false
    initial_value: '1.8'

  # Von Kármán spectral turbulence parameters
  - id: turbulence_length_scale
    type: float
    restore_value: false
    initial_value: '25.0'  # Length scale L in meters
    
  - id: turbulence_intensity_sigma
    type: float
    restore_value: false
    initial_value: '0.3'   # Intensity σ parameter
    
  - id: turbulence_time_scale
    type: float
    restore_value: false
    initial_value: '5.0'   # Time scale for spectral evolution
    
  - id: spectral_energy_buffer
    type: float
    restore_value: false
    initial_value: '0.0'   # Buffer for spectral energy accumulation
    
  - id: spectral_phase_accumulator
    type: float
    restore_value: false
    initial_value: '0.0'   # Phase accumulator for spectral evolution

  # Thermal bubble parameters
  - id: thermal_bubble_active
    type: bool
    restore_value: false
    initial_value: 'false'
    
  - id: thermal_bubble_strength
    type: float
    restore_value: false
    initial_value: '2.5'   # Thermal bubble intensity multiplier
    
  - id: thermal_bubble_radius
    type: float
    restore_value: false
    initial_value: '15.0'  # Thermal bubble spatial radius in meters
    
  - id: thermal_bubble_start_time
    type: float
    restore_value: false
    initial_value: '0.0'
    
  - id: thermal_bubble_duration
    type: float
    restore_value: false
    initial_value: '8.0'   # Thermal bubble duration in seconds
    
  - id: thermal_bubble_frequency
    type: float
    restore_value: false
    initial_value: '0.05'  # Probability of thermal bubble occurrence
    
  - id: last_thermal_check
    type: float
    restore_value: false
    initial_value: '0.0'
    
  - id: current_thermal_contribution
    type: float
    restore_value: false
    initial_value: '0.0'
    
  # Weather phase system
  - id: current_weather_phase
    type: int
    restore_value: false
    initial_value: '1'  # 0=quiet, 1=medium, 2=high
    
  - id: phase_start_time
    type: float
    restore_value: false
    initial_value: '0.0'
    
  - id: phase_duration
    type: float
    restore_value: false
    initial_value: '60.0'
    
  - id: phase_wind_min
    type: float
    restore_value: false
    initial_value: '5.0'
    
  - id: phase_wind_max
    type: float
    restore_value: false
    initial_value: '15.0'

# ====================================================================================
# RANDOMIZED WIND SIMULATION ENGINE
# ====================================================================================

script:
  # Apply fan speed with safety limits and power check
  - id: apply_fan_speed
    parameters:
      speed_percent: float
    then:
      - if:
          condition:
            lambda: 'return !id(fan_power_enabled);'
          then:
            - lambda: |-
                id(fan_pwm_output).turn_off();
                ESP_LOGD("wind", "Fan power disabled - ignoring speed command");
          else:
            - lambda: |-
                float requested_speed = speed_percent / 100.0f;
                float speed_limit = id(fan_speed_limit).state / 100.0f;
                float min_speed = id(minimum_fan_speed).state / 100.0f;
                float intensity_multiplier = id(wind_intensity).state / 100.0f;
                
                // Apply global intensity modifier during simulation
                if (id(wind_simulation_active)) {
                  requested_speed *= intensity_multiplier;
                }
                
                // Enforce speed limits
                requested_speed = fmax(min_speed, fmin(speed_limit, requested_speed));
                
                if (requested_speed <= 0.01f) {
                  id(fan_pwm_output).turn_off();
                } else {
                  id(fan_pwm_output).set_level(requested_speed);
                }

  # Handle oscillating mode changes (Steady vs Wind)
  - id: handle_mode_change
    parameters:
      oscillating: bool
    then:
      - lambda: |-
          id(is_oscillating) = oscillating;
          ESP_LOGI("wind", "Mode changed to: %s", oscillating ? "Wind Simulation" : "Steady Mode");
          
          // Stop current activities
          id(wind_simulation_loop).stop();
          id(gust_check_loop).stop();
          id(thermal_bubble_loop).stop();
          id(wind_simulation_active) = false;
          
          // Reset gust and thermal state
          id(gust_active) = false;
          id(gust_intensity) = 1.0f;
          id(gust_active_sensor).publish_state(0);
          id(thermal_bubble_active) = false;
          id(thermal_bubble_sensor).publish_state(0);
          
      - delay: 300ms
      - script.execute:
          id: apply_current_preset
          force_apply: true

  # Handle preset mode changes
  - id: handle_preset_change
    parameters:
      preset_name: std::string
    then:
      - lambda: |-
          std::string preset = preset_name;
          ESP_LOGI("wind", "Preset changed to: %s", preset.c_str());
          
          // Update current preset tracking
          id(current_preset_mode) = preset;
          
          // Stop all current activities
          id(wind_simulation_loop).stop();
          id(gust_check_loop).stop();
          id(thermal_bubble_loop).stop();
          id(external_sensor_loop).stop();
          id(external_sensor_timeout_loop).stop();
          id(wind_simulation_active) = false;
          
          // Reset gust and thermal state
          id(gust_active) = false;
          id(gust_intensity) = 1.0f;
          id(gust_active_sensor).publish_state(0);
          id(thermal_bubble_active) = false;
          id(thermal_bubble_sensor).publish_state(0);
          
      - delay: 300ms
      - script.execute:
          id: apply_current_preset
          force_apply: true

  # Apply current preset based on oscillating state
  - id: apply_current_preset
    parameters:
      force_apply: bool
    then:
      - lambda: |-
          std::string preset = id(current_preset_mode);
          bool is_wind_mode = id(is_oscillating);
          
          ESP_LOGI("wind", "Applying preset '%s' in %s mode", 
                   preset.c_str(), is_wind_mode ? "Wind" : "Steady");
          
          // Handle External sensor preset (mode-independent)
          if (preset == "External") {
            id(external_sensor_loop).execute();
            id(external_sensor_timeout_loop).execute();
            ESP_LOGI("wind", "External Sensor preset activated with timeout monitoring");
            return;
          }
          
          // Handle other presets based on oscillating state
          if (!is_wind_mode) {
            // Steady mode - fixed speeds with corresponding wind speed values in m/s
            float steady_wind_ms = 0.0f;
            if (preset == "Countryside (Low)") {
              id(apply_fan_speed).execute(25.0f);
              steady_wind_ms = 2.0f;  // Mid-range of 0.7-3.4
            } else if (preset == "Mediterranean (Medium)") {
              id(apply_fan_speed).execute(50.0f);
              steady_wind_ms = 2.9f;  // Mid-range of 1.6-4.2
            } else if (preset == "Ocean (High)") {
              id(apply_fan_speed).execute(75.0f);
              steady_wind_ms = 4.9f;  // Mid-range of 3.1-6.8
            } else if (preset == "Mountain (Breeze)") {
              id(apply_fan_speed).execute(35.0f);
              steady_wind_ms = 4.8f;  // Mid-range of 2.2-7.5
            } else if (preset == "Plains (Max)") {
              id(apply_fan_speed).execute(85.0f);  // Reduced from 100%
              steady_wind_ms = 6.4f;  // Mid-range of 4.0-8.8
            }
            
            // Publish steady wind speed value in m/s
            id(wind_speed_sensor).publish_state(steady_wind_ms);
          } else {
            // Wind simulation mode - different environments
            if (preset == "Countryside (Low)") {
              // Countryside: Gentle, steady breezes with occasional soft gusts (1.5-7.5 mph -> 0.7-3.4 m/s)
              id(base_wind_min) = 0.7f;
              id(base_wind_max) = 3.4f;
              id(gust_probability_base) = 0.006f;
              id(location_gust_strength) = 1.35f;
              id(start_wind_simulation).execute();
            } else if (preset == "Mediterranean (Medium)") {
              // Mediterranean: Warm coastal winds with thermal-driven gusts (reduced max to prevent clamp)
              id(base_wind_min) = 1.6f;
              id(base_wind_max) = 4.2f;  // Reduced from 4.9
              id(gust_probability_base) = 0.012f;
              id(location_gust_strength) = 1.55f;
              id(start_wind_simulation).execute();
            } else if (preset == "Ocean (High)") {
              // Ocean: Steady maritime winds with rolling pressure-driven gusts (reduced max)
              id(base_wind_min) = 3.1f;
              id(base_wind_max) = 6.8f;  // Reduced from 7.6
              id(gust_probability_base) = 0.025f;
              id(location_gust_strength) = 1.9f;
              id(start_wind_simulation).execute();
            } else if (preset == "Mountain (Breeze)") {
              // Mountain: Variable terrain winds with sharp elevation-driven gusts (reduced max)
              id(base_wind_min) = 2.2f;
              id(base_wind_max) = 7.5f;  // Reduced from 8.5
              id(gust_probability_base) = 0.045f;
              id(location_gust_strength) = 2.2f;
              id(start_wind_simulation).execute();
            } else if (preset == "Plains (Max)") {
              // Plains: Consistent strong winds with powerful pressure-system gusts (reduced max)
              id(base_wind_min) = 4.0f;
              id(base_wind_max) = 8.8f;  // Reduced from 10.3
              id(gust_probability_base) = 0.070f;
              id(location_gust_strength) = 2.4f;
              id(start_wind_simulation).execute();
            }
          }

  # Start wind simulation (extracted common logic)
  - id: start_wind_simulation
    then:
      - lambda: |-
          // Initialize wind state with phase-specific ranges
          float mid_range = (id(base_wind_min) + id(base_wind_max)) * 0.5f;
          id(current_wind_speed) = mid_range;
          id(target_wind_speed) = mid_range;
          
          // Reset momentum variables to avoid stale values
          // Note: These are static in the calculation function, so we can't directly reset them here
          
          ESP_LOGI("wind", "Initializing wind simulation: mid_range=%.1f m/s", mid_range);
          
          // Initialize phase system
          id(current_weather_phase) = 1; // Start with medium phase
          id(phase_start_time) = millis() / 1000.0f;
          id(phase_duration) = 120.0f; // 2 minutes initial phase
          
          // Set initial phase ranges (medium) with tighter bounds
          float range_span = id(base_wind_max) - id(base_wind_min);
          id(phase_wind_min) = id(base_wind_min) + (range_span * 0.15f);
          id(phase_wind_max) = id(base_wind_min) + (range_span * 0.85f);
          
          // Start simulation
          id(wind_simulation_active) = true;
